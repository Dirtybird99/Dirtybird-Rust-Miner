name: Setup
description: Install Rust (stable), Zig 0.14.1, and cargo-zigbuild for cross-compilation.
runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
    - uses: mlugg/setup-zig@v2
      with:
        version: 0.14.1
    - uses: taiki-e/install-action@v2
      with:
        tool: cargo-zigbuild
