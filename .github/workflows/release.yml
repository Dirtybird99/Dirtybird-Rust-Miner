name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version/tag to build and publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Add cross targets
        run: rustup target add x86_64-pc-windows-gnu x86_64-unknown-linux-musl aarch64-unknown-linux-musl

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "v=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "v=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # Cross-compiles every target from this one runner via cargo-zigbuild (zig cc):
      # Windows x86_64, Linux x86_64 + aarch64 (static musl), and a HiveOS/MMPOS pkg.
      # The committed _pgo/merged.profdata makes the x86 release binaries PGO-optimized
      # (zig cc is clang-19, matching the profile). Hash output is identical on every target.
      - name: Build all platforms + package
        run: bash scripts/release.sh "${{ steps.ver.outputs.v }}"

      - name: Verify checksums
        run: cd dist && sha256sum -c SHA256SUMS.txt

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.ver.outputs.v }}"
          ASSETS=(dist/*.zip dist/*.tar.gz dist/SHA256SUMS.txt)
          if gh release view "$V" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$V" "${ASSETS[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$V" "${ASSETS[@]}" --repo "$GITHUB_REPOSITORY" \
              --title "Dirtybird Rust Miner $V" --generate-notes
          fi
