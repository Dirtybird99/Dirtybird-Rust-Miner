name: Security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: rust
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"

  check-binaries:
    name: Check for Binaries
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Fail if binary artifacts are tracked
        run: |
          # Exempt: the in-repo release archives under releases/, and the committed PGO
          # profile (which makes release builds PGO-optimized + reproducible).
          bad=$(git ls-files \
            | grep -iE '\.(exe|dll|so|dylib|a|obj|pdb|lib|zip|tar|gz|xz|bz2|7z|profdata|profraw)$' \
            | grep -vE '^releases/|^_pgo/merged\.profdata$' || true)
          if [ -n "$bad" ]; then
            echo "::error::Binary/artifact files are tracked in the repo:"; echo "$bad"; exit 1
          fi
          echo "OK: no tracked binary artifacts (releases/ and the PGO profile are exempt)."

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Dependency Review only runs on pull requests (it diffs the PR's manifests).
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
